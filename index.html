<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novel Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-top">
      <h1>Novel Search</h1>
      <div class="header-controls">
        <!-- Theme Switcher -->
        <div class="theme-switcher" title="Switch theme">
          <button class="theme-pill active" id="theme-midnight" data-theme="theme-midnight">🌌 Midnight</button>
          <button class="theme-pill" id="theme-sakura" data-theme="theme-sakura">🌸 Sakura</button>
          <button class="theme-pill" id="theme-cyberpunk" data-theme="theme-cyberpunk">📟 Neon</button>
        </div>
        <!-- Import/Export & Sync -->
        <div class="backup-controls">
          <button id="syncBtn" class="backup-btn" title="Sync data between devices">🔄 Sync</button>
          <button id="exportBtn" class="backup-btn" title="Export your library backup">⬆ Export</button>
          <label id="importLabel" class="backup-btn" title="Import a library backup">⬇ Import
            <input type="file" id="importFile" accept=".json" hidden>
          </label>
        </div>
      </div>
    </div>

    <input type="text" id="searchInput" placeholder="Search for novels by title, author, genre...">

    <!-- Library Filter Pills -->
    <div class="library-filter-bar">
      <span class="filter-label">Library:</span>
      <div class="library-pills">
        <button class="lib-pill active" data-lib="all">All</button>
        <button class="lib-pill" data-lib="favorite">❤ Favorites</button>
        <button class="lib-pill" data-lib="Reading">Reading</button>
        <button class="lib-pill" data-lib="Plan to Read">Plan to Read</button>
        <button class="lib-pill" data-lib="Completed">Completed</button>
        <button class="lib-pill" data-lib="Dropped">Dropped</button>
      </div>
    </div>

    <div class="filter-bar">
      <button id="tagToggleBtn" class="tag-toggle-btn">
        <span id="tagToggleIcon">▾</span> Filter by Tags
        <span id="activeTagCount" class="active-tag-count hidden">0</span>
      </button>
      <button id="clearTagsBtn" class="clear-tags-btn hidden">Clear All</button>
      <button id="hideNoCoverBtn" class="cover-toggle-btn">
        <span id="hideNoCoverIcon">📸</span> Hide No Cover
      </button>
    </div>
    <div id="tagPanel" class="tag-panel">
      <div id="tagContainer" class="tag-container"></div>
    </div>
  </header>

  <div id="resultsSummary" class="results-summary"></div>

  <main>
    <div id="novelGrid" class="novel-grid"></div>
  </main>

  <div id="novelModal" class="modal">
    <div class="modal-content glass">
      <span class="close-btn">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <div id="syncModal" class="modal">
    <div class="modal-content glass sync-modal-content">
      <span class="close-btn" id="syncCloseBtn">&times;</span>
      <div id="syncModalBody"></div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
